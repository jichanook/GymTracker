{% extends "base.html" %}

{% block content %}

<h2>Weigh In</h2>

<form method="POST">

    <div class="mb-3">

        <label class="form-label">
            Weight (kg)
        </label>

        <input
            type="number"
            step="0.1"
            name="weight"
            class="form-control"
            required>

    </div>

    <button
        type="submit"
        class="btn btn-primary">

        Save Weight

    </button>

</form>

{% endblock %}
